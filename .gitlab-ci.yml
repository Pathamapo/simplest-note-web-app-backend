stages:
  - test
  - build
  - push
  - deploy

# ตั้งค่าตัวแปรกลาง
variables:
  DOCKER_TLS_CERTDIR: "/certs"

# 1. Stage Test: เช็คโค้ดก่อนว่ารันผ่านไหม
test_backend:
  stage: test
  image: node:18-alpine
  tags:
    - informatics
  script:
    - cd backend
    - npm install
    - npm test || echo "No tests defined, skipping..."
  only:
    - main

test_frontend:
  stage: test
  image: node:18-alpine
  tags:
    - informatics
  script:
    - cd frontend
    - npm install
    - npm run lint || echo "No linting defined, skipping..."
  only:
    - main

# 2. Stage Build: สร้าง Image จาก Dockerfile
build_images:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  tags:
    - informatics
  script:
    - docker build -t $CI_REGISTRY_IMAGE/backend:latest ./backend
    - docker build -t $CI_REGISTRY_IMAGE/frontend:latest ./frontend
  only:
    - main

# 3. Stage Push: ส่ง Image ขึ้นไปเก็บที่ GitLab Container Registry
push_images:
  stage: push
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  tags:
    - informatics
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker push $CI_REGISTRY_IMAGE/backend:latest
    - docker push $CI_REGISTRY_IMAGE/frontend:latest
  only:
    - main

# 4. Stage Deploy: สั่งให้ Server มหาลัยดึง Image ใหม่ไปรัน
deploy_to_server:
  stage: deploy
  image: alpine:latest
  tags:
    - informatics
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan 10.5.3.213 >> ~/.ssh/known_hosts
  script:
    # รีโมทไปที่ Server เพื่อดึงภาพใหม่และ restart container
    - ssh -o StrictHostKeyChecking=no user@10.5.3.213 "cd /home/user/app && docker compose pull && docker compose up -d"
  only:
    - main
  when: manual # ให้เรากดปุ่ม Deploy เองเพื่อความชัวร์
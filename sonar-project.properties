# Project identification
sonar.projectKey=Pathamapo_simplest-note-web-app-backend
sonar.organization=pathamapornw
sonar.projectName=simplest-note-web-app
sonar.projectVersion=1.0
# Source code
sonar.sources=frontend,backend
sonar.sourceEncoding=UTF-8
# SonarCloud server URL
sonar.host.url=https://sonarcloud.io
# บอกทางไปหาไฟล์รายงานที่เราเพิ่งรันได้
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info

# บอกโฟลเดอร์ที่เก็บไฟล์เทสต์ (เพื่อให้มันรู้ว่าคะแนนมาจากไหน)
sonar.tests=/test
sonar.test.inclusions=**/*.test.js
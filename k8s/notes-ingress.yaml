apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: notes-app-ingress
  namespace: notesapp
spec:
  ingressClassName: nginx
  rules:
  
http:
    paths:

      
path: /health
      pathType: Prefix
      backend:
        service:
          name: backend-service
          port:
            number: 3000

      
path: /notes
      pathType: Prefix
      backend:
        service:
          name: backend-service
          port:
            number: 3000

      
path: /users
      pathType: Prefix
      backend:
        service:
          name: backend-service
          port:
            number: 3000

      
path: /
      pathType: Prefix
      backend:
        service:
          name: frontend-service
          port:
            number: 80
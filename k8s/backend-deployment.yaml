apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: notesapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
  spec:
      containers:
      - name: backend
        image: YOUR_BACKEND_IMAGE
        ports:
        - containerPort: 3000
        env: # <--- ต้องเริ่มตรงนี้ (เยื้องจากขีดกลางเข้ามา 2 เคาะ)
        - name: MONGO_URL
          value: "mongodb://10.5.3.213:27017/notesapp"
        - name: PORT
          value: "3000"
        - name: SESSION_SECRET
          value: "supersecret123"
        - name: FRONTEND_URL
          value: "http://10.5.3.213:31476/"
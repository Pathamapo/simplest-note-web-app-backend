name: DevSecOps Full Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. Install Backend dependencies & run tests
      - name: Test Backend
        run: |
          cd backend
          npm install
          npm test
        env:
          MONGO_URL: mongodb://localhost:27017/notesdb

      # 4. Create coverage report (Fake/Real)
      - name: Create Fake Coverage Report
        run: |
          mkdir -p coverage
          echo -e "TN:\nSF:dummy.js\nDA:1,1\nDA:2,1\nDA:3,1\nLF:3\nLH:3\nend_of_record" > coverage/lcov.info

      # 5. SonarCloud Scan
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=Pathamapo_simplest-note-web-app-backend
            -Dsonar.organization=pathamapornw
            -Dsonar.sources=frontend,backend
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # 6. Trivy Scan (scan ช่องโหว่)
      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          exit-code: 0

      # 7. Docker Login
      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 8. Build & Push Backend Image
      - name: Build & Push Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/notesapp-backend:latest ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/notesapp-backend:latest

      # 9. Build & Push Frontend Image
      - name: Build & Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/notesapp-frontend:latest ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/notesapp-frontend:latest

      # 10. Install kubectl
      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      # 11. Setup kubeconfig
      - name: Setup kubeconfig
        run: echo "${{ secrets.KUBECONFIG }}" > kubeconfig.yaml

      # 12. Deploy to Kubernetes (เปิดเมื่อพร้อม)
      - name: Deploy to Kubernetes
        if: false  # เปลี่ยนเป็น true เมื่อพร้อม
        run: |
          export KUBECONFIG=$PWD/kubeconfig.yaml
          kubectl get nodes
          kubectl apply -f k8s/
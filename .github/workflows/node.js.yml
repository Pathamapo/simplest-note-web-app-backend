name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test-build-push:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
    # 1. ดึงโค้ด
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. ตั้งค่า Node
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    # 3. Install + Test Backend
    - name: Test Backend
      run: |
        cd backend
        npm install
        npm test
      env:
        MONGO_URL: mongodb://localhost:27017/notesdb

    # 4. Build Frontend
    - name: Build Frontend
      run: |
        cd frontend
        npm install
        npm run build
      env:
        VITE_API_URL: http://localhost:3000/api/notes

    # 5. Login Docker Hub
    - name: Login Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # 6. Build Docker Backend
    - name: Build Backend Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/notes-backend ./backend

    # 7. Build Docker Frontend
    - name: Build Frontend Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/notes-frontend ./frontend

    # 8. Push Docker
    - name: Push Backend Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/notes-backend

    - name: Push Frontend Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/notes-frontend
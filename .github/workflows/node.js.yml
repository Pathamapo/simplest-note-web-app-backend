name: DevSecOps Full Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. Test Backend
      - name: Test Backend
        run: |
          cd backend
          npm install
          npm test
        env:
          MONGO_URL: mongodb://localhost:27017/notesdb
          NODE_ENV: test

      # 4. SonarCloud Scan
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=Pathamapo_simplest-note-web-app-backend
            -Dsonar.organization=pathamapornw
            -Dsonar.sources=frontend,backend
            -Dsonar.coverage.exclusions=**
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # 5. Security Scan (Trivy)
      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          exit-code: 0

      # 6. Docker Login
      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 7. Build & Push Backend
      - name: Build & Push Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/notesapp-backend:latest ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/notesapp-backend:latest

      # 8. Build & Push Frontend
      - name: Build & Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/notesapp-frontend:latest ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/notesapp-frontend:latest

      # 9. Install kubectl
      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      # 10. Setup kubeconfig
      - name: Setup kubeconfig
        run: echo "${{ secrets.KUBECONFIG }}" > kubeconfig.yaml

      # 11. Deploy to Kubernetes (เปิดเมื่อพร้อม)
      - name: Deploy to Kubernetes
        if: false   # 🔥 เปลี่ยนเป็น true เมื่อมีไฟล์ k8s/ พร้อม
        run: |
          export KUBECONFIG=$PWD/kubeconfig.yaml
          kubectl apply -f k8s/
          kubectl get pods
          kubectl get services
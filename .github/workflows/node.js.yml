name: DevSecOps Full Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. Install Backend dependencies & run tests (No coverage)
      - name: Test Backend
        run: |
          cd backend
          npm install
          npm test
        env:
          MONGO_URL: mongodb://localhost:27017/notesdb
          NODE_ENV: test

      # 4. Remove coverage folder (just in case)
      - name: Remove coverage
        run: rm -rf backend/coverage

      # 5. SonarCloud Scan (without coverage)
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=Pathamapo_simplest-note-web-app-backend
            -Dsonar.organization=pathamapornw
            -Dsonar.sources=frontend,backend

      # 6. Scan dependencies (Trivy)
      - name: Scan dependencies (Trivy)
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: 'fs'
          scan-ref: '.'

      # 7. Docker Login
      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKERHUB_PASS }}" | docker login -u "${{ secrets.DOCKERHUB_USER }}" --password-stdin

      # 8. Build & Push Backend Docker image
      - name: Build & Push Backend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USER }}/notesapp-backend:latest ./backend
          docker push ${{ secrets.DOCKERHUB_USER }}/notesapp-backend:latest

      # 9. Build & Push Frontend Docker image
      - name: Build & Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USER }}/notesapp-frontend:latest ./frontend
          docker push ${{ secrets.DOCKERHUB_USER }}/notesapp-frontend:latest

      # 10. Install kubectl
      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      # 11. Setup kubeconfig
      - name: Setup kubeconfig
        run: echo "${{ secrets.KUBECONFIG }}" > kubeconfig.yaml

      # 12. Deploy to Kubernetes (เปิดเมื่อพร้อม)
      - name: Deploy to Kubernetes
        if: false  # เปลี่ยนเป็น true เมื่อพร้อม
        run: |
          export KUBECONFIG=$PWD/kubeconfig.yaml
          kubectl get nodes
          kubectl apply -f k8s/
name: DevSecOps Full Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. Test Backend
      - name: Test Backend
        run: |
          cd backend
          npm install
          npm test
        env:
          MONGO_URL: mongodb://localhost:27017/notesdb

      # 4. SonarCloud Scan (แก้แล้ว)
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=pathamapornw
            -Dsonar.organization=pathamapornw
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # 5. Trivy Scan (แก้ version แล้ว)
      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          exit-code: 1

      # 6. Login Docker Hub
      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 7. Build Backend Image
      - name: Build Backend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/notesapp-backend:latest ./backend

      # 8. Push Backend Image
      - name: Push Backend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/notesapp-backend:latest

      # 9. Build Frontend Image
      - name: Build Frontend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/notesapp-frontend:latest ./frontend

      # 10. Push Frontend Image
      - name: Push Frontend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/notesapp-frontend:latest

      # 11. Install kubectl
      - name: Install kubectl
        run: |
          curl -LO https://dl.k8s.io/release/stable.txt
          curl -LO https://dl.k8s.io/release/$(cat stable.txt)/bin/linux/amd64/kubectl
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      # 12. Setup kubeconfig
      - name: Setup kubeconfig
        run: echo "${{ secrets.KUBECONFIG }}" > kubeconfig.yaml

      # 13. Deploy to Kubernetes
      - name: Deploy to Kubernetes
        if: github.ref == 'refs/heads/main'
        run: |
          export KUBECONFIG=$PWD/kubeconfig.yaml
          kubectl get nodes
          kubectl apply -f k8s/
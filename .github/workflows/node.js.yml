name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test-build-push:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
    # 1. Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Setup Node.js
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    # 3. Install + Test Backend
    - name: Test Backend
      run: |
        cd backend
        npm install
        npm test
      env:
        MONGO_URL: mongodb://localhost:27017/notesdb

    # 4. SonarCloud Scan 🔥
    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@v2
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    # 5. Build Frontend
    - name: Build Frontend
      run: |
        cd frontend
        npm install
        npm run build
      env:
        VITE_API_URL: http://localhost:3000/api/notes

    # 6. Login Docker Hub
    - name: Login Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # 7. Build Docker Backend
    - name: Build Backend Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/notes-backend:latest ./backend

    # 8. Build Docker Frontend
    - name: Build Frontend Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/notes-frontend:latest ./frontend

    # 9. Push Docker Backend
    - name: Push Backend Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/notes-backend:latest

    # 10. Push Docker Frontend
    - name: Push Frontend Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/notes-frontend:latest
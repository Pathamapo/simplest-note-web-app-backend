name: DevSecOps Full Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. Install backend dependencies
      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      # 4. Run backend tests + coverage
      - name: Backend Tests + Coverage
        run: |
          cd backend
          npm test -- --coverage
        env:
          MONGO_URL: mongodb://localhost:27017/notesdb

      # 5. Install frontend dependencies
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install --legacy-peer-deps

      # 6. Run frontend tests + coverage
      - name: Frontend Tests + Coverage
        run: |
          cd frontend
          npm run test -- --coverage

      # 7. SonarCloud Scan
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=Pathamapo_simplest-note-web-app-backend
            -Dsonar.organization=pathamapornw
            -Dsonar.sources=frontend,backend
            -Dsonar.tests=frontend,backend
            -Dsonar.test.inclusions=**/*.spec.js,**/*.test.js
            -Dsonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info,backend/coverage/lcov.info
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # 8. Trivy Scan
      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          exit-code: 0

      # 9. Login Docker Hub
      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 10. Build & Push Backend Image
      - name: Build & Push Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/notesapp-backend:latest ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/notesapp-backend:latest

      # 11. Build & Push Frontend Image
      - name: Build & Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/notesapp-frontend:latest ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/notesapp-frontend:latest

      # 12. Install kubectl
      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/stable.txt"
          curl -LO "https://dl.k8s.io/release/$(cat stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      # 13. Setup kubeconfig
      - name: Setup kubeconfig
        run: echo "${{ secrets.KUBECONFIG }}" > kubeconfig.yaml

      # 14. Deploy to Kubernetes
      - name: Deploy to Kubernetes
        if: github.ref == 'refs/heads/main'
        run: |
          export KUBECONFIG=$PWD/kubeconfig.yaml
          kubectl get nodes
          kubectl apply -f k8s/